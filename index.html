<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SweetPlayer</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/sidebar.css">
  <link rel="stylesheet" href="src/styles/player.css">
  <link rel="stylesheet" href="src/styles/settings.css">
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">♪</div>
          <span class="logo-text">SweetPlayer</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
      </div>

      <!-- 歌单区域 -->
      <div class="sidebar-playlists">
        <div class="nav-section">
          <div class="playlists-header">
            <span class="nav-label">歌单</span>
            <button class="playlist-add-btn" id="addPlaylistBtn" title="新建歌单">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
          </div>
          <ul class="nav-list" id="playlistList">
            <li class="nav-item playlist-item" data-id="all-songs">
              <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></span>
              <span class="nav-text">全部歌曲</span>
            </li>
            <li class="nav-item playlist-item" data-id="my-favorites">
              <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span>
              <span class="nav-text">我的收藏</span>
            </li>
          </ul>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-label">在线资源</span>
          <ul class="nav-list">
            <li class="nav-item active" data-id="discover">
              <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></span>
              <span class="nav-text">发现音乐</span>
              <span class="nav-shortcut">Ctrl+D</span>
            </li>
          </ul>
        </div>
      </nav>

      <div class="sidebar-actions">
        <div class="nav-section">
          <span class="nav-label">快捷操作</span>
          <ul class="nav-list">
            <li class="nav-item action-item" data-id="sponsor">
              <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span>
              <span class="nav-text">赞助</span>
            </li>
            <li class="nav-item action-item" data-id="settings">
              <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></span>
              <span class="nav-text">设置</span>
            </li>
          </ul>
        </div>
      </div>
    </aside>

    <!-- 主区域 -->
    <div class="main-area">
      <!-- 自定义标题栏（拖动区域） -->
      <div class="title-bar">
        <div class="title">SweetPlayer</div>
      </div>

      <!-- 主内容区 -->
      <div class="main-content" id="mainContent">
        <div class="placeholder-text">
          <h1>SweetPlayer</h1>
          <p>音乐播放器</p>
        </div>
      </div>

      <!-- 底部播放器 -->
      <div class="control-bar">
        <div class="progress-bar">
          <span class="time" id="currentTime">0:00</span>
          <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="time" id="duration">0:00</span>
        </div>

        <div class="control-left">
          <div class="now-playing-cover" id="nowPlayingCover">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <img id="coverImg" style="display: none; width: 100%; height: 100%; object-fit: cover;" alt="cover">
          </div>
          <div class="song-info">
            <span class="song-name" id="playerSongName">未在播放</span>
            <span class="artist-name" id="playerArtistName">--</span>
          </div>
        </div>

        <div class="control-center">
          <button class="control-btn" id="playModeBtn" title="顺序播放">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
          </button>
          <button class="control-btn" id="prevBtn" title="上一首">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="control-btn play-btn" id="playBtn" title="播放/暂停">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="control-btn" id="nextBtn" title="下一首">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="control-btn" id="playlistToggleBtn" title="播放列表">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
          </button>
        </div>

        <div class="control-right">
          <div class="playmode-menu" id="playModeMenu" style="display: none;">
            <div class="playmode-menu-item" data-mode="single">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
              <span>单曲循环</span>
            </div>
            <div class="playmode-menu-item" data-mode="order">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
              <span>顺序播放</span>
            </div>
            <div class="playmode-menu-item" data-mode="reverse">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7H7v3l-4-4 4-4v3h12v6h-2V7zm-10 10h10v-3l4 4-4 4v-3H5v-6h2v4z"/></svg>
              <span>逆序播放</span>
            </div>
            <div class="playmode-menu-item" data-mode="random">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
              <span>随机播放</span>
            </div>
            <div class="playmode-menu-item" data-mode="stop">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
              <span>播完停止</span>
            </div>
          </div>
          <button class="control-btn" id="speedBtn" title="倍速">
            <span class="speed-text">1x</span>
          </button>
          <div class="speed-popup" id="speedPopup">
            <div class="speed-options">
              <button class="speed-option" data-speed="0.5">0.5x</button>
              <button class="speed-option" data-speed="0.75">0.75x</button>
              <button class="speed-option active" data-speed="1">1x</button>
              <button class="speed-option" data-speed="1.25">1.25x</button>
              <button class="speed-option" data-speed="1.5">1.5x</button>
              <button class="speed-option" data-speed="2">2x</button>
            </div>
          </div>
          <div class="volume-control" id="volumeControl">
            <button class="control-btn" id="volumeBtn" title="音量">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <div class="volume-popup">
              <div class="volume-slider" id="volumeSlider">
                <div class="volume-fill" id="volumeFill"></div>
              </div>
              <span class="volume-value" id="volumeValue">60</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 播放列表面板 -->
    <div class="player-playlist-panel" id="playerPlaylistPanel">
      <div class="playlist-panel-header">
        <span class="playlist-panel-title">播放列表</span>
        <span class="playlist-panel-count" id="playlistPanelCount">0首</span>
        <button class="playlist-panel-clear" id="playlistPanelClear" title="清空列表">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          <span>清空</span>
        </button>
      </div>
      <div class="playlist-panel-list" id="playlistPanelList"></div>
    </div>
  </div>

  <!-- 新建/编辑歌单弹窗 -->
  <div class="modal-overlay" id="createPlaylistModal" style="display: none;">
    <div class="modal-dialog modal-dialog-large">
      <div class="modal-header">
        <h3 class="modal-title" id="playlistModalTitle">新建歌单</h3>
        <button class="modal-close" id="modalCloseBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-cover-section">
          <div class="modal-cover-preview" id="playlistCoverPreview">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
            <span>点击设置封面</span>
          </div>
          <input type="file" id="playlistCoverInput" accept="image/*" style="display: none;">
        </div>
        <div class="modal-input-group">
          <label class="modal-label">歌单名称</label>
          <input type="text" class="modal-input" id="playlistNameInput" placeholder="请输入歌单名称" maxlength="50">
          <span class="modal-hint">最多 50 个字符</span>
        </div>
        <div class="modal-input-group">
          <label class="modal-label">歌单描述</label>
          <textarea class="modal-textarea" id="playlistDescInput" placeholder="请输入歌单描述（可选）" maxlength="200" rows="3"></textarea>
          <span class="modal-hint">最多 200 个字符</span>
        </div>

      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-secondary" id="modalCancelBtn">取消</button>
        <button class="modal-btn modal-btn-primary" id="modalConfirmBtn">创建</button>
      </div>
    </div>
  </div>

  <!-- 右键菜单 -->
  <div class="context-menu" id="playlistContextMenu" style="display: none;">
    <div class="context-menu-item" id="contextImportFiles">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
      <span>添加文件</span>
    </div>
    <div class="context-menu-item" id="contextImportFolder">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-1 6h-3v3h-2v-3h-3v-2h3V7h2v3h3v2z"/></svg>
      <span>添加文件夹</span>
    </div>
    <div class="context-menu-divider" id="contextEditDivider"></div>
    <div class="context-menu-item" id="contextEdit">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <span>编辑歌单</span>
    </div>
    <div class="context-menu-divider" id="contextDeleteDivider"></div>
    <div class="context-menu-item context-menu-item-danger" id="contextDelete">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      <span>删除歌单</span>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div class="confirm-overlay" id="confirmModal" style="display: none;">
    <div class="confirm-dialog">
      <div class="confirm-body">
        <svg class="confirm-icon" id="confirmIcon" width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-2h2v2h-2zm0-10v6h2V7h-2z"/></svg>
        <h3 class="confirm-title" id="confirmTitle">确认删除</h3>
        <p class="confirm-message" id="confirmMessage">确定要删除这个歌单吗？</p>
      </div>
      <div class="confirm-footer">
        <button class="confirm-btn confirm-btn-secondary" id="confirmCancelBtn">取消</button>
        <button class="confirm-btn confirm-btn-danger" id="confirmOkBtn">删除</button>
      </div>
    </div>
  </div>

  <script src="src/js/theme.js"></script>
  <script src="src/js/player.js"></script>
  <script src="src/js/sponsor.js"></script>
  <script src="src/js/settings.js"></script>
  <script src="src/js/sidebar.js"></script>
  <script src="src/js/main.js"></script>
</body>
</html>
